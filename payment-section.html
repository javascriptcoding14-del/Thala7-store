<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Complete your purchase securely using UPI,
     credit card, debit card, net banking, wallets, and other trusted payment methods. Fast, safe, and encrypted checkout.">
    <link rel="stylesheet" href="/css/payment-section.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
     <title>Payment Page</title>
</head>
<body>
      
                <div class="left">
                    <p>checkout</p>
                    <h2>Contact Details</h2>
                    <label for="email">Email ID</label>
                    <input type="email" id="email" name="email" placeholder="Email">
                    <h2>Payment</h2>
                    <div class="left-box">
                        <div class="bank-cards">
                                <div class="cards">
                                        <i class="fa-solid fa-credit-card"></i>  <!-- Card -->
                                        <span>Card</span>
                                </div>
                                 <div>
                                         <i class="fa-brands fa-bitcoin"></i>  <!-- Crypto -->
                                         <span>Crypto</span>
                                 </div>
                                 <div>
                                          <i class="fa-solid fa-building-columns"></i>  <!-- Bank -->
                                          <span>Bank</span>
                                 </div>
                                 <div class="dots">
                                            <i class="fa-solid fa-ellipsis-vertical"></i>
                                 </div>
                                    
                                    
                                    
                        </div>
                         <form>
                                <div class="form-group">
                                    <label for="card">Card Number</label>
                                    <input type="number" id="card" name="card" placeholder="Card Number">
                                </div>
                                 <div class="form-group1">
                                        <div class="form-group">    
                                            <label for="expiry">Expiry</label>
                                            <input type="text" id="expiry" name="expiry" placeholder="MM/YY">
                                        </div>
                                        <div class="form-group">
                                            <label for="cvc">CVC</label>
                                            <input type="number" id="cvc" name="cvc" placeholder="...">
                                        </div>

                                </div>
                                <div class="form-group1">
                                        <div class="form-group">    
                                            <label for="country">Country</label>
                                            <input type="text" id="country" name="country" placeholder="India">
                                        </div>
                                        <div class="form-group">
                                            <label for="zip">ZIP</label>
                                            <input type="number" id="zip" name="zip" placeholder="xxxx">
                                        </div>
                                </div>

                        </form>
                    </div>

                </div>
                <div class="right">
                         <h2>Order Summary</h2>
                        <div class="cuppon-container">
                            <div>
                                <label for="cuppon">Enter Coupon Code</label>
                                <input type="text" id="cuppon" name="cuppon" placeholder="Coupon Code">
                                <a href="#coupon">Apply Coupon</a>
                            </div>
                            <div class="price">
                                <p>Sub total</p>
                                <span>&#8377;4,000</span>
                            </div> 
                            <div class="price"> 
                                <p>Taxes(if applicable)</p>
                                <span>&#8377;199</span>
                            </div>
                            <div class="price">  
                                <p>Discount</p>
                                <span>&#8377;0</span>
                            </div>
                            <div class=" total-price">
                                <p>Total</p>
                                <span>&#8377;4,999</span>
                            </div>
                        </div>
                        
                        <a href="#pay" class="pay-btn">Pay Now &#8377;4,999</a>
                        <div class="payment-methods">
                            
                            <img src="images/visa.jpeg" alt="Visa">
                            <img src="images/razorpay.jpeg" alt="Razorpay">
                            <img src="images/upi.jpeg" alt="UPI">
                        </div>

                    </div>

                

      
</body>
</html>
